# ========================================================
# APPLICATION CONFIGURATION
# ========================================================
spring.application.name=ecommerce-log-generator
server.port=8081

# ========================================================
# H2 DATABASE CONFIGURATION
# ========================================================
spring.datasource.url=jdbc:h2:mem:ecommerce_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ========================================================
# JPA / HIBERNATE CONFIGURATION
# ========================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Disable Open Session In View - force explicit fetching
spring.jpa.open-in-view=false

# Database Initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true

# ========================================================
# LOGGING CONFIGURATION
# ========================================================
logging.config=classpath:logback-spring.xml
logging.file.name=logs/ecommerce_sentinel.json
logging.level.root=INFO
logging.level.com.ecommerce=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ========================================================
# CHAOS ENGINEERING CONFIGURATION
# ========================================================
chaos.random.error.enabled=false
chaos.random.error.probability=0.05
chaos.payment.bypass.enabled=false
chaos.db.latency.spike.enabled=false
chaos.db.latency.spike.duration=2000
chaos.force.auth.failure.enabled=false

# ========================================================
# PAYMENT CONFIGURATION
# ========================================================
# Enables probabilistic payment gateway simulation
# true  → 70% SUCCESS, 15% FAILED, 15% TIMEOUT
# false → always SUCCESS (deterministic, for testing)
payment.chaos.enabled=true

# ========================================================
# ACTUATOR CONFIGURATION
# ========================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ========================================================
# MVC / ERROR HANDLING
# ========================================================
# Throw NoHandlerFoundException for unknown routes (enables custom 404)
spring.mvc.throw-exception-if-no-handler-found=true
# Disable default static resource handler so unknown paths aren't silently swallowed
spring.web.resources.add-mappings=false

# ========================================================
# THYMELEAF CONFIGURATION
# ========================================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ========================================================
# SECURITY CONFIGURATION
# ========================================================
spring.security.user.name=admin
spring.security.user.password=admin

