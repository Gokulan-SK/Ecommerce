<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - E-Commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1; }
        .stat-card {
            border-radius: 12px; border: none;
            transition: transform .2s, box-shadow .2s;
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,.1); }
    </style>
</head>

<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container py-5">
        <div class="d-flex align-items-center mb-4">
            <div>
                <h1 class="h3 fw-bold mb-0">Admin Dashboard</h1>
                <p class="text-muted mb-0">
                    Logged in as <strong sec:authentication="name">admin</strong>
                </p>
            </div>
        </div>

        <!-- Quick-links to existing admin-relevant routes -->
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card stat-card p-4 h-100">
                    <div class="mb-3" style="font-size:2rem;">🛍️</div>
                    <h5 class="fw-semibold">Products</h5>
                    <p class="text-muted">View and manage the product catalog.</p>
                    <a th:href="@{/products}" class="btn btn-dark btn-sm mt-auto">Go to Products →</a>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card p-4 h-100">
                    <div class="mb-3" style="font-size:2rem;">📦</div>
                    <h5 class="fw-semibold">Orders</h5>
                    <p class="text-muted">View order history across the platform.</p>
                    <a th:href="@{/orders}" class="btn btn-dark btn-sm mt-auto">Go to Orders →</a>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card p-4 h-100">
                    <div class="mb-3" style="font-size:2rem;">📊</div>
                    <h5 class="fw-semibold">Actuator Health</h5>
                    <p class="text-muted">Check application health and metrics.</p>
                    <a th:href="@{/actuator/health}" class="btn btn-dark btn-sm mt-auto" target="_blank">View Health →</a>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
