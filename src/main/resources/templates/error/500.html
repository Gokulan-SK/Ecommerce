<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Internal Server Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: #f8f9fa;
        }

        main {
            flex: 1;
        }

        .error-code {
            font-size: 7rem;
            font-weight: 800;
            color: #dee2e6;
            line-height: 1;
        }

        .error-title {
            font-size: 1.75rem;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="d-flex align-items-center justify-content-center py-5">
        <div class="text-center">
            <div class="error-code">500</div>
            <h1 class="error-title mt-2">Something Went Wrong</h1>
            <p class="text-muted mt-2 mb-2">
                An unexpected error occurred on our end. Please try again.
            </p>
            <p class="text-muted small mb-4" th:if="${error}" th:text="${error}"></p>
            <a th:href="@{/}" class="btn btn-dark px-4">← Back to Home</a>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
