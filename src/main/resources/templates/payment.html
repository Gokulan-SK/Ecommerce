<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - E-Commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .payment-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.10);
        }

        .payment-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 16px 16px 0 0;
            padding: 2rem;
        }

        .amount-display {
            font-size: 2.5rem;
            font-weight: 700;
            color: #667eea;
        }

        .status-badge-failed {
            background-color: #dc3545;
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .status-badge-timeout {
            background-color: #fd7e14;
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .pay-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 0.75rem 2rem;
            font-size: 1.1rem;
            border-radius: 8px;
            color: white;
            transition: opacity 0.2s;
        }

        .pay-btn:hover {
            opacity: 0.9;
            color: white;
        }

        .chaos-badge {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
        }
    </style>
</head>

<body>
    <!-- Global Navbar -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-5" style="max-width: 640px;" th:if="${view != null}">

        <!-- Error Alert -->
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <strong>⚠️</strong> <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card payment-card">
            <!-- Header -->
            <div class="payment-header text-center">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <span></span>
                    <span class="chaos-badge">🎲 Simulated Gateway</span>
                </div>
                <h2 class="mb-1">💳 Complete Payment</h2>
                <p class="mb-0 opacity-75">Order #<span th:text="${view.orderId}">0</span></p>
            </div>

            <div class="card-body p-4">

                <!-- Retry notice if previous attempt failed -->
                <div th:if="${payment != null}" class="alert alert-warning mb-4">
                    <strong>Previous attempt:</strong>
                    <span th:if="${payment.status.name() == 'FAILED'}" class="status-badge-failed ms-2">FAILED</span>
                    <span th:if="${payment.status.name() == 'TIMEOUT'}" class="status-badge-timeout ms-2">TIMEOUT</span>
                    <span class="ms-2 text-muted small">You may retry below.</span>
                </div>

                <!-- Amount -->
                <div class="text-center mb-4">
                    <p class="text-muted mb-1">Amount Due</p>
                    <div class="amount-display">
                        $<span th:text="${#numbers.formatDecimal(view.totalAmount, 1, 2)}">0.00</span>
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="bg-light rounded p-3 mb-4">
                    <h6 class="mb-3 text-muted">Order Summary</h6>
                    <div th:each="item : ${view.items}" class="d-flex justify-content-between mb-1">
                        <span th:text="${item.productName + ' × ' + item.quantity}">Product × 1</span>
                        <span th:text="'$' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}">$0.00</span>
                    </div>
                    <hr class="my-2">
                    <div class="d-flex justify-content-between fw-bold">
                        <span>Total</span>
                        <span th:text="'$' + ${#numbers.formatDecimal(view.totalAmount, 1, 2)}">$0.00</span>
                    </div>
                </div>

                <!-- Gateway Info -->
                <div class="alert alert-info small mb-4">
                    <strong>ℹ️ Simulation:</strong> 70% SUCCESS · 15% FAILED · 15% TIMEOUT
                </div>

                <!-- Pay Button -->
                <form th:action="@{/payments/{id}/pay(id=${view.orderId})}" method="post">
                    <button type="submit" id="pay-btn" class="btn pay-btn w-100"
                        onclick="this.disabled=true; this.innerText='Processing...'; this.form.submit();">
                        🔒 Pay Now — $<span th:text="${#numbers.formatDecimal(view.totalAmount, 1, 2)}">0.00</span>
                    </button>
                </form>

                <!-- Cancel -->
                <div class="text-center mt-3">
                    <a th:href="@{/orders/{id}(id=${view.orderId})}" class="text-muted small">
                        ← Back to Order
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
