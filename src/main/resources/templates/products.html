<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - E-Commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/products">🛒 E-Commerce</a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text text-white me-3">
                    Welcome, <strong sec:authentication="name">User</strong>
                </span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="alert alert-success" role="alert">
            <h4 class="alert-heading">✅ Authentication Successful!</h4>
            <p>You are now logged in as <strong sec:authentication="name">user</strong>.</p>
            <hr>
            <p class="mb-0">Phase 3 (Session-Based Security) is working correctly.</p>
        </div>

        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Product Catalog (Coming Soon)</h5>
                <p class="card-text">Products will be displayed here in later phases.</p>
                <hr>
                <p class="mb-0">
                    <strong>Your Role:</strong> <span sec:authentication="principal.authorities">[ROLE]</span>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
